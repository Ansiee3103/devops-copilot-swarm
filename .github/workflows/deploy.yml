name: DevOps Copilot Swarm CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION:  ap-south-1
  ECR_REPO:    devops-copilot-swarm
  ACCOUNT_ID:  006600132909
  EC2_USER:    ubuntu

jobs:

  # ── Job 1: Tests ──────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          APP_ENV:      testing
          SECRET_KEY:   test-secret-key-minimum-32-chars-here
          GROQ_API_KEY: test-key
          DATABASE_URL: sqlite:///database/test.db
        run: |
          mkdir -p database
          pytest tests/ -v --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: .pytest_cache/

  # ── Job 2: Security Scan ──────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref:  .
          severity:  CRITICAL,HIGH
          exit-code: 0
          format:    table

  # ── Job 3: Build & Push to ECR ───────────────────────
  build:
    name: 📦 Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main'

    outputs:
      image-tag: ${{ steps.vars.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        run: |
          ECR_URI=${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}
          TAG=${{ steps.vars.outputs.tag }}
          
          echo "🏗️ Building image: $ECR_URI:$TAG"
          
          # Debug: Check if Dockerfile exists
          ls -la docker/ || echo "❌ docker/ directory not found"
          cat docker/Dockerfile || echo "❌ Dockerfile not found"
          
          # Get ECR login credentials
          aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
            docker login --username AWS --password-stdin $ECR_URI
          
          docker build -f docker/Dockerfile \
            --no-cache \
            -t $ECR_URI:$TAG \
            -t $ECR_URI:latest \
            --progress=plain \
            .
          
          echo "⬆️ Pushing to ECR..."
          docker push $ECR_URI:$TAG
          docker push $ECR_URI:latest
          
          echo "✅ Pushed: $ECR_URI:$TAG"

  # ── Job 4: Deploy to EC2 ──────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host:    ${{ secrets.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key:     ${{ secrets.EC2_SSH_KEY }}
          timeout: 180s
          script: |
            echo "🚀 Deploying DevOps Copilot Swarm..."

            # Login to ECR
            aws ecr get-login-password --region ap-south-1 | \
              docker login --username AWS --password-stdin \
              006600132909.dkr.ecr.ap-south-1.amazonaws.com

            # Pull latest image
            docker pull 006600132909.dkr.ecr.ap-south-1.amazonaws.com/devops-copilot-swarm:latest

            # Stop old container
            docker stop devops-swarm-app 2>/dev/null || true
            docker rm   devops-swarm-app 2>/dev/null || true

            # Start new container
            docker run -d \
              --name devops-swarm-app \
              --restart unless-stopped \
              -p 8080:8080 \
              --env-file /app/.env \
              --network host \
              006600132909.dkr.ecr.ap-south-1.amazonaws.com/devops-copilot-swarm:latest

            # Cleanup old images
            docker image prune -f

            echo "✅ Container started!"

      - name: Health Check
        run: |
          echo "⏳ Waiting 20s for startup..."
          sleep 20

          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              https://13.207.184.168.nip.io/health)
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Attempt $i: status=$STATUS — retrying in 10s..."
            sleep 10
          done

          echo "❌ Health check failed after 5 attempts"
          exit 1

      - name: Comment on commit
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji  = status === 'success' ? '✅' : '❌';
            const sha    = context.sha.substring(0, 8);

            github.rest.repos.createCommitComment({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              commit_sha: context.sha,
              body: `${emoji} Deployment \`${sha}\` ${status}\n\n🌐 https://13.207.184.168.nip.io/dashboard/index.html`
            });