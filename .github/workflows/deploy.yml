name: DevOps Copilot Swarm CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

env:
  AWS_REGION: ap-south-1
  ECR_REPO: devops-copilot-swarm
  ACCOUNT_ID: "006600132909"
  EC2_USER: ubuntu

jobs:
  # ── Job 1: Tests ──────────────────────────────────────
  test:
    name: 🧪 Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          APP_ENV: testing
          SECRET_KEY: test-secret-key-minimum-32-chars-here
          GROQ_API_KEY: test-key
          DATABASE_URL: sqlite:///database/test.db
        run: |
          mkdir -p database
          pytest tests/ -v --tb=short

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: .pytest_cache/

  # ── Job 2: Security Scan ──────────────────────────────
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 0
          format: table

  # ── Job 3: Build & Push to ECR ───────────────────────
  build:
    name: 📦 Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [test, security]

    outputs:
      image-tag: ${{ steps.vars.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: echo "tag=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build and push
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          REGISTRY=${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          ECR_URI=$REGISTRY/${{ env.ECR_REPO }}
          TAG=${{ steps.vars.outputs.tag }}

          echo "🏗️ Building image: $ECR_URI:$TAG"

          # Debug: Check if Dockerfile exists
          ls -la docker/ || echo "❌ docker/ directory not found"
          cat docker/Dockerfile || echo "❌ Dockerfile not found"

          docker build -f docker/Dockerfile \
            --no-cache \
            -t $ECR_URI:$TAG \
            -t $ECR_URI:latest \
            --progress=plain \
            .

          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            if [ "${#AWS_ACCESS_KEY_ID}" -eq 0 ] || [ "${#AWS_SECRET_ACCESS_KEY}" -eq 0 ]; then
              echo "❌ AWS credentials are required for main branch push"
              exit 1
            fi

            aws ecr get-login-password --region ${{ env.AWS_REGION }} | \
              docker login --username AWS --password-stdin $REGISTRY

            echo "⬆️ Pushing to ECR..."
            docker push $ECR_URI:$TAG
            docker push $ECR_URI:latest

            echo "✅ Pushed: $ECR_URI:$TAG"
          else
            echo "ℹ️ Non-main branch run: image built successfully, ECR push skipped intentionally."
          fi

  # ── Job 4: Deploy to EC2 ──────────────────────────────
  deploy:
    name: 🚀 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    env:
      EC2_HOST: ${{ secrets.EC2_HOST }}

    steps:
      - name: Deploy via SSH (main) or validate (non-main)
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            if [ -z "${EC2_HOST}" ] || [ -z "${EC2_SSH_KEY}" ]; then
              echo "❌ EC2 deployment secrets are required on main branch"
              exit 1
            fi

            echo "🚀 Deploying DevOps Copilot Swarm..."
            mkdir -p ~/.ssh
            echo "${EC2_SSH_KEY}" > ~/.ssh/ec2_key
            chmod 600 ~/.ssh/ec2_key

            ssh -o StrictHostKeyChecking=no -i ~/.ssh/ec2_key ${{ env.EC2_USER }}@${EC2_HOST} \
              "set -e; \
              ECR_URI=${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}; \
              aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com; \
              docker pull \$ECR_URI:latest; \
              docker stop devops-swarm-app 2>/dev/null || true; \
              docker rm devops-swarm-app 2>/dev/null || true; \
              docker run -d --name devops-swarm-app --restart unless-stopped -p 8080:8080 --env-file /app/.env --network host \$ECR_URI:latest; \
              docker image prune -f; \
              echo '✅ Container started!'"
          else
            echo "ℹ️ Non-main branch run: deploy checks executed, production deployment skipped intentionally."
          fi

      - name: Health Check
        run: |
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            echo "⏳ Waiting 20s for startup..."
            sleep 20

            for i in {1..5}; do
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                https://${EC2_HOST}.nip.io/health)
              if [ "$STATUS" = "200" ]; then
                echo "✅ Health check passed!"
                exit 0
              fi
              echo "Attempt $i: status=$STATUS — retrying in 10s..."
              sleep 10
            done

            echo "❌ Health check failed after 5 attempts"
            exit 1
          fi

          echo "ℹ️ Non-main branch run: health check skipped intentionally."

      - name: Comment on commit
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const status = '${{ job.status }}';
            const emoji  = status === 'success' ? '✅' : '❌';
            const sha    = context.sha.substring(0, 8);
            try {
              await github.rest.repos.createCommitComment({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                commit_sha: context.sha,
                body: `${emoji} Deployment \`${sha}\` ${status}\n\n🌐 https://${process.env.EC2_HOST}.nip.io/dashboard/index.html`
              });
            } catch (error) {
              core.warning(`Failed to post deployment status to commit: ${error.message}`);
            }
