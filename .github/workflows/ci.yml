name: DevOps Copilot Swarm CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-south-1
  ECR_REPO: devops-copilot-swarm
  ACCOUNT_ID: "006600132909"

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: pip

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Run tests
        env:
          APP_ENV: testing
          SECRET_KEY: test-secret-key-minimum-32-chars
          GROQ_API_KEY: test-key
        run: |
          if [ -d tests ]; then
            pytest tests/ -v --tb=short
          else
            echo "No tests directory found, skipping."
          fi

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: 0

  build-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.ref == 'refs/heads/main'
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push
        id: meta
        run: |
          ECR_URI=${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}
          TAG=${{ github.sha }}

          docker build -f docker/Dockerfile -t $ECR_URI:$TAG -t $ECR_URI:latest .
          docker push $ECR_URI:$TAG
          docker push $ECR_URI:latest

          echo "version=$TAG" >> $GITHUB_OUTPUT
          echo "✅ Pushed: $ECR_URI:$TAG"

  deploy:
    name: Deploy to AWS via SSM
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get EC2 Instance ID
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
              --filters "Name=tag:Name,Values=devops-swarm" "Name=instance-state-name,Values=running" \
              --query "Reservations[0].Instances[0].InstanceId" \
              --output text \
              --region ${{ env.AWS_REGION }})
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Execute Deploy Command via SSM Run Command
        run: |
          ECR_URI=${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}
          TAG=${{ needs.build-push.outputs.image-tag }}
          
          aws ssm send-command \
              --instance-ids ${{ steps.ec2.outputs.instance_id }} \
              --document-name "AWS-RunShellScript" \
              --parameters commands=[
                "aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin ${{ env.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com",
                "docker pull $ECR_URI:$TAG",
                "docker tag $ECR_URI:$TAG $ECR_URI:latest",
                "cd /app && docker-compose -f docker-compose.prod.yml up -d --force-recreate",
                "echo 'Deployment complete!'"
              ] \
              --region ${{ env.AWS_REGION }}

      - name: Verify Deployment Health
        run: |
          EC2_IP=$(aws ec2 describe-instances \
              --filters "Name=tag:Name,Values=devops-swarm" "Name=instance-state-name,Values=running" \
              --query "Reservations[0].Instances[0].PublicIpAddress" \
              --output text \
              --region ${{ env.AWS_REGION }})
          
          echo "Waiting for app startup (30s)..."
          sleep 30
          curl -f http://$EC2_IP/health || exit 1
          echo "✅ Health check passed!"

      - name: Notify Slack
        if: always()
        run: |
          STATUS="${{ job.status }}"
          EMOJI="✅"
          if [ "$STATUS" != "success" ]; then EMOJI="❌"; fi

          curl -X POST ${{ secrets.SLACK_WEBHOOK_URL }} \
              -H 'Content-Type: application/json' \
              -d "{\"text\": \"$EMOJI DevOps Swarm deployed to AWS — Status: $STATUS\"}"