
services:

  app:
    image: 006600132909.dkr.ecr.ap-south-1.amazonaws.com/devops-copilot-swarm:latest
    container_name: devops-swarm-app
    ports:
      - "8080:8080"
    environment:
      - APP_ENV=production
      - REDIS_HOST=127.0.0.1
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY}
      - EMAIL_SENDER=${EMAIL_SENDER}
      - EMAIL_PASSWORD=${EMAIL_PASSWORD}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL}
    volumes:
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./models:/app/models
    restart: unless-stopped
    network_mode: host
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  celery_worker:
    image: 006600132909.dkr.ecr.ap-south-1.amazonaws.com/devops-copilot-swarm:latest
    container_name: devops-swarm-worker
    command: celery -A backend.celery_app worker --loglevel=info --concurrency=2
    environment:
      - APP_ENV=production
      - REDIS_HOST=127.0.0.1
      - DATABASE_URL=${DATABASE_URL}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENCODE_API_KEY=${OPENCODE_API_KEY}
    volumes:
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    restart: unless-stopped
    network_mode: host
    depends_on:
      - app

  nginx:
    image: nginx:alpine
    container_name: devops-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    network_mode: host
    depends_on:
      - app
